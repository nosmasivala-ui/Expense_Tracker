<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Report</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen py-12 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl border border-slate-100 shadow-xl overflow-hidden">
        <div class="bg-indigo-600 px-8 py-8 text-white">
            <span
                class="text-xs font-bold uppercase tracking-widest bg-indigo-500/50 px-3 py-1 rounded-full text-indigo-100">
                Financial Summary
            </span>
            <h1 class="text-3xl font-extrabold mt-2">Breakdown for {{ month_name }}</h1>
        </div>

        <div class="p-8 space-y-8">
            <div class="bg-slate-50 p-6 rounded-xl border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Total Month Expenditure</p>
                    <p class="text-4xl font-black text-slate-900 mt-1">₹{{ total_spent }}</p>
                </div>
                <div class="text-4xl">📉</div>
            </div>

            <div>
                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4">Expenditure by Category</h3>
                <div class="divide-y divide-slate-100 border border-slate-100 rounded-xl overflow-hidden">
                    {% for row in category_breakdown %}
                    <div class="flex items-center justify-between p-4 bg-white hover:bg-slate-50/50 transition">
                        <span class="font-semibold text-slate-700">{{ row.name }}</span>
                        <span class="font-bold text-slate-900 text-lg">₹{{ row.total }}</span>
                    </div>
                    {% empty %}
                    <p class="p-6 text-center text-slate-400 italic bg-white text-sm">No recorded items for this
                        calendar month.</p>
                    {% endfor %}
                </div>
            </div>

            <div class="pt-2">
                <a href="{% url 'expense_list' %}"
                    class="block w-full text-center py-3 border border-slate-200 text-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-50 transition">
                    ⬅️ Return to Main Dashboard
                </a>
            </div>
        </div>
    </div>

</body>

</html>
